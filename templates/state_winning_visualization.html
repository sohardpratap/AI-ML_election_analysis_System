<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Winning Visualization</title>
</head>
<body>
    <h1>Visualize Winning Party Data</h1>
    <form id="visualizationForm" method="POST">
        {% csrf_token %}
        <label for="state">State:</label>
        <input type="text" id="state" name="state" required><br><br>

        <label for="year">Year:</label>
        <input type="number" id="year" name="year" required><br><br>

        <button type="submit">Generate Visualization</button>
    </form>

    <div id="result">
        <!-- Visualization image will appear here -->
    </div>

    <script>
    const form = document.getElementById("visualizationForm");
    form.onsubmit = async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const response = await fetch("{% url 'state_winning_visualization' %}", {
            method: "POST",
            body: formData
        });

        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = ""; // Clear previous result

        if (response.ok) {
            const data = await response.json();
            const img = document.createElement("img");
            img.src = "/" + data.image_path; // Django serves media with "/media/"
            resultDiv.appendChild(img);
        } else {
            const error = await response.json();
            resultDiv.innerHTML = `<p style="color:red;">Error: ${error.error}</p>`;
        }
    };
</script>

</body>
</html>
