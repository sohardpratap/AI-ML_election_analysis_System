<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sentiment Analysis</title>
</head>
<body>
    <h1>Sentiment Analysis</h1>
    <form method="POST">
        {% csrf_token %}
        <textarea name="tweet" rows="5" cols="50" placeholder="Enter tweet text here"></textarea><br>
        <button type="submit">Analyze Sentiment</button>
    </form>

    {% if sentiment_result %}
        <h2>Sentiment Result: {{ sentiment_result }}</h2>
    {% endif %}
</body>
</html>
